name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AC61E4: ${{ secrets.AC61E4 }}
          BD386E: ${{ secrets.BD386E }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AC61E4', '')
          bm = os.environ.get('BD386E', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 889677c37fa7b9c860ecb01b041bb7 -->', gm)
          if bm:
              s2 = s2.replace('<!-- 2cb109fb3b474b3e622a -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
